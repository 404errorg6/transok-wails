name: Wails Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
 NODE_OPTIONS: "--max-old-size=4096"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}
  
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4

      - name: 'Install Go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: 'Install Linux dependencies'
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt instal -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential pkg-config

      - name: 'Install wails'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest 
      
      - name: 'Build app'
        run: |
          cd transok-wails
          wails build
          ls build/bin

