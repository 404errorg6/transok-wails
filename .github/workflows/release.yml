name: Wails Build #currently failing for linux build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
 NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            output_name: windows

          - os: macos-latest
            output_name: macos

    runs-on: ${{ matrix.os }}
  
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4

      - name: 'Setup Node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 'Install Go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: 'Install wails'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

#      - name: 'Install Linux dependencies'
#        if: matrix.os == 'ubuntu-22.04'
#        run: |
#          #echo "deb http://gb.archive.ubuntu.com/ubuntu jammy main" | sudo tee -a /etc/apt/sources.list  #Add repo for installing dependencies
#          sudo apt update
#          #sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config build-essential
#          sudo apt install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      
      - name: 'Build app'
        run: |
          wails build

      - name: Rename binary with OS name
        shell: bash
        run: |
          # Move into the build directory
          cd build/bin/
              
          # Find your binary (assuming it starts with 'transok-app')
          # This replaces the original name with name-os_name
          for file in transok-app*; do
            if [[ -f "$file" ]]; then
              # Get the extension if it exists (e.g., .exe)
              filename="${file%.*}"
              extension="${file##*.}"
                  
              if [ "$filename" == "$extension" ]; then
                mv "$file" "${filename}-${{ matrix.os }}"
              else
                mv "$file" "${filename}-${{ matrix.os }}.${extension}"
              fi
            fi
          done

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/bin/*
            !build/bin/*.worker.js

