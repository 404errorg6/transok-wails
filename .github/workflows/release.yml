name: Wails Build

on: [push]

permissions:
  contents: write

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # 22.04 is perfect for the 4.0-dev package
        os: [ubuntu-22.04, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}
  
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4

      - name: 'Setup Node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 'Install Go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: 'Install Wails'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: 'Install Linux dependencies'
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          # Added -y so the runner doesn't wait for "Yes/No" input and hang
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev pkg-config build-essential

      - name: 'Build app'
        run: |
          # 1. This fixes the ENOENT wailsjs error you had earlier
          wails generate module
          # 2. Build the production binary
          wails build
          
      - name: 'Upload Artifacts'
        uses: actions/upload-artifact@v4
        with:
          name: transok-${{ matrix.os }}
          path: |
            build/bin/*
            !build/bin/*.worker.js
