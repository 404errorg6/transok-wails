name: Wails Build

on: [push]
  #push:
    #tags:
    #  - 'v*'

permissions:
  contents: write

env:
 NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}
  
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4

      - name: 'Setup Node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 'Install Go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: 'Install wails'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: 'Install Linux dependencies'
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo echo "deb http://gb.archive.ubuntu.com/ubuntu jammy main" >> /etc/apt/sources.list  //Add repo for installing dependencies
          sudo apt update
          #sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config build-essential
          sudo apt install libgtk-3-dev libwebkit2gtk-4.0-dev

      
      - name: 'Build app'
        run: |
          wails build
          ls build/bin

